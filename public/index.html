<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friends Forever</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Thanks for your valuable support, please install this app</h1>
        <p class="subtitle">
          Enter the OTP shared with your invite and choose your platform.
        </p>

        <div class="field">
          <label for="inviteCode">Invite Code</label>
          <input id="inviteCode" type="text" readonly />
        </div>

        <div class="field">
          <label for="otp">OTP</label>
          <input
            id="otp"
            type="text"
            placeholder="Enter OTP"
            autocomplete="one-time-code"
            maxlength="6"
          />
        </div>

        <div class="actions">
          <button id="androidBtn" class="btn btn-primary">Download Android</button>
          <button id="iosBtn" class="btn btn-secondary">Download iOS</button>
        </div>

        <p id="status" class="status"></p>
      </section>
    </main>

    <script src="/config.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
